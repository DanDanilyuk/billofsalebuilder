<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Free Vehicle Bill of Sale Builder - All 50 US States</title>
  <meta name="description" content="Bill of Sale Builder makes a free, printable vehicle bill of sale for any US state. Cars, trailers, boats - with state-aware notary and odometer rules.">
  <meta name="theme-color" content="#0a0a0a">

  <link rel="canonical" href="https://www.billofsalebuilder.com/">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Bill of Sale Builder">
  <meta property="og:title" content="Free Vehicle Bill of Sale Builder - All 50 US States">
  <meta property="og:description" content="Bill of Sale Builder makes a free, printable vehicle bill of sale for any US state. Cars, trailers, boats - with state-aware notary and odometer rules.">
  <meta property="og:url" content="https://www.billofsalebuilder.com/">
  <meta property="og:image" content="https://www.billofsalebuilder.com/og.svg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Free Vehicle Bill of Sale Builder - All 50 US States">
  <meta name="twitter:description" content="Bill of Sale Builder makes a free, printable vehicle bill of sale for any US state. Cars, trailers, boats - with state-aware notary and odometer rules.">
  <meta name="twitter:image" content="https://www.billofsalebuilder.com/og.svg">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Bill of Sale Builder",
    "description": "Bill of Sale Builder makes a free, printable vehicle bill of sale for any US state. Cars, trailers, boats - with state-aware notary and odometer rules.",
    "url": "https://www.billofsalebuilder.com/",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Any",
    "browserRequirements": "Requires a modern browser with JavaScript enabled.",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <link rel="stylesheet" href="css/styles.css">

  <script>
    // No-flash theme init: read user's explicit choice or fall back to OS.
    // Runs before stylesheets paint; CSS keys off the data-theme attribute.
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        // localStorage / matchMedia disabled - fall through to default light.
      }
    })();
  </script>
</head>
<body>
  <header class="page-header">
    <h1 class="brand">Bill of Sale Builder</h1>
    <div class="brand-sub" data-state-subtitle></div>
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </button>
  </header>

  <main class="wizard">
    <div class="progress" aria-label="Wizard progress">
      <span class="progress__seg" data-step="1"></span>
      <span class="progress__seg" data-step="2"></span>
      <span class="progress__seg" data-step="3"></span>
      <span class="progress__seg" data-step="4"></span>
      <span class="progress__seg" data-step="5"></span>
      <span class="progress__seg" data-step="6"></span>
    </div>

    <section class="step" data-step="1" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <form class="step__form" data-step-form="1"><!-- fields injected by app.js --></form>
    </section>

    <section class="step" data-step="2" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <form class="step__form" data-step-form="2"></form>
    </section>

    <section class="step" data-step="3" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <form class="step__form" data-step-form="3"></form>
    </section>

    <section class="step" data-step="4" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <form class="step__form" data-step-form="4"></form>
    </section>

    <section class="step" data-step="5" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <form class="step__form" data-step-form="5"></form>
    </section>

    <section class="step" data-step="6" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <iframe class="pdf-preview" title="Bill of Sale preview"></iframe>
    </section>

    <div class="actions">
      <button type="button" class="btn btn--ghost" data-action="back">Back</button>
      <button type="button" class="btn btn--secondary" data-action="clear" hidden>Clear form</button>
      <button type="button" class="btn btn--primary" data-action="continue">Continue</button>
      <a class="btn btn--primary" data-action="download" hidden>Download PDF</a>
    </div>
  </main>

  <footer class="page-footer">
    <p class="page-footer__disclaimer" data-page-disclaimer></p>
    <p class="page-footer__credit">
      Made by <a href="https://dandanilyuk.com/" target="_blank" rel="noopener">Dan Danilyuk</a> -
      <a href="https://github.com/DanDanilyuk/billofsalebuilder" target="_blank" rel="noopener">GitHub</a>
    </p>
  </footer>

  <div class="modal" data-modal hidden>
    <div class="modal__overlay" data-modal-overlay></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-clear-title">
      <h2 class="modal__title" id="modal-clear-title" data-modal-title></h2>
      <p class="modal__body" data-modal-body></p>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" data-modal-cancel></button>
        <button type="button" class="btn btn--primary" data-modal-confirm></button>
      </div>
    </div>
  </div>

  <script src="lib/jspdf.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
