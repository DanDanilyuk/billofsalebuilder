<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Free Vehicle Bill of Sale Generator - All 50 US States</title>
  <meta name="description" content="Create a free, printable vehicle bill of sale for any US state. Covers cars, trailers, and boats with state-aware notary and odometer rules.">
  <meta name="theme-color" content="#0a0a0a">

  <link rel="canonical" href="https://TBD.example/">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Vehicle Bill of Sale">
  <meta property="og:title" content="Free Vehicle Bill of Sale Generator - All 50 US States">
  <meta property="og:description" content="Create a free, printable vehicle bill of sale for any US state. Covers cars, trailers, and boats with state-aware notary and odometer rules.">
  <meta property="og:url" content="https://TBD.example/">
  <meta property="og:image" content="https://TBD.example/og.svg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Free Vehicle Bill of Sale Generator - All 50 US States">
  <meta name="twitter:description" content="Create a free, printable vehicle bill of sale for any US state. Covers cars, trailers, and boats with state-aware notary and odometer rules.">
  <meta name="twitter:image" content="https://TBD.example/og.svg">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Vehicle Bill of Sale Generator",
    "description": "Create a free, printable vehicle bill of sale for any US state. Covers cars, trailers, and boats with state-aware notary and odometer rules.",
    "url": "https://TBD.example/",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Any",
    "browserRequirements": "Requires a modern browser with JavaScript enabled.",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="page-header">
    <div class="brand">Vehicle Bill of Sale</div>
    <div class="brand-sub" data-state-subtitle></div>
  </header>

  <main class="wizard">
    <div class="progress" aria-label="Wizard progress">
      <span class="progress__seg" data-step="1"></span>
      <span class="progress__seg" data-step="2"></span>
      <span class="progress__seg" data-step="3"></span>
      <span class="progress__seg" data-step="4"></span>
      <span class="progress__seg" data-step="5"></span>
      <span class="progress__seg" data-step="6"></span>
    </div>

    <section class="step" data-step="1" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <form class="step__form" data-step-form="1"><!-- fields injected by app.js --></form>
    </section>

    <section class="step" data-step="2" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <form class="step__form" data-step-form="2"></form>
    </section>

    <section class="step" data-step="3" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <form class="step__form" data-step-form="3"></form>
    </section>

    <section class="step" data-step="4" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <form class="step__form" data-step-form="4"></form>
    </section>

    <section class="step" data-step="5" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <form class="step__form" data-step-form="5"></form>
    </section>

    <section class="step" data-step="6" hidden>
      <div class="eyebrow" data-step-eyebrow></div>
      <h1 class="step__title" data-step-title></h1>
      <p class="step__sub" data-step-sub></p>
      <iframe class="pdf-preview" title="Bill of Sale preview"></iframe>
    </section>

    <div class="actions">
      <button type="button" class="btn btn--ghost" data-action="back">Back</button>
      <button type="button" class="btn btn--secondary" data-action="clear" hidden>Clear form</button>
      <button type="button" class="btn btn--primary" data-action="continue">Continue</button>
      <a class="btn btn--primary" data-action="download" hidden>Download PDF</a>
    </div>
  </main>

  <footer class="page-footer" data-page-disclaimer></footer>

  <div class="modal" data-modal hidden>
    <div class="modal__overlay" data-modal-overlay></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-clear-title">
      <h2 class="modal__title" id="modal-clear-title" data-modal-title></h2>
      <p class="modal__body" data-modal-body></p>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" data-modal-cancel></button>
        <button type="button" class="btn btn--primary" data-modal-confirm></button>
      </div>
    </div>
  </div>

  <script src="lib/jspdf.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
